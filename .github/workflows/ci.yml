name: CI - Build & Push to GHCR

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/taskmanager-frontend
  IMAGE_BACKEND:  ghcr.io/${{ github.repository_owner }}/taskmanager-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Frontend ──────────────────────────────────────────────
      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.IMAGE_FRONTEND }}:latest,${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

      # ── Backend ───────────────────────────────────────────────
      - name: Build Backend
        run: |
          cd backend/TaskManager.API
          dotnet restore
          dotnet build --no-restore

      - name: Build & Push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/TaskManager.API
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.IMAGE_BACKEND }}:latest,${{ env.IMAGE_BACKEND }}:${{ github.sha }}
